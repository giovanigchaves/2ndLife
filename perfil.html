<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="css/perfil.css" />
</head>

<body class="body-perfil">
    <header class="topo">
        <div class="topo-container">
            <img src="assets/logo2ndLife-2.png" alt="Logo 2ndLife" class="topo-logo" />
            <p class="slogan">"Seus itens ganhando uma nova vida!"</p>
            <nav class="topo-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" onclick="abrirCadastroNovo()">Cadastrar Item</a>
                <a href="itens-cadastrados.html">Itens Cadastrados</a>
                <a href="#" onclick="sair()">Sair</a>
            </nav>
            <div class="perfil-miniatura">
                <img id="fotoMiniatura" src="assets/avatar-default.png" alt="Foto de perfil" />
                <span id="nomeMiniatura">Usuário</span>
            </div>
        </div>

    </header>
    <div class="container">
        <h2>Meu Perfil</h2>
        <div id="previewFoto" class="preview-foto"></div>
        <form id="formPerfil">
            <label>Foto de Perfil:</label>
            <input type="file" id="fotoPerfil" accept="image/*" />
            

            <label>Nome:</label>
            <input type="text" id="nomePerfil" required />

            <label>Email:</label>
            <input type="email" id="emailPerfil" readonly />


            <label>Telefone:</label>
            <input type="tel" id="telefonePerfil" placeholder="(00) 00000-0000" />

            <label>CEP:</label>
            <input type="text" id="cep" placeholder="00000-000" />

            <label>Rua:</label>
            <input type="text" id="rua" />

            <label>Bairro:</label>
            <input type="text" id="bairro" />

            <label>Número:</label>
            <input type="text" id="numero" />

            <label>Cidade:</label>
            <input type="text" id="cidade" />

            <label>Estado:</label>
            <input type="text" id="estado" />

            <button type="submit" class="btn-salvar">Salvar Perfil</button>
        </form>
    </div>

    <script src="js/perfil.js"></script>
</body>

</html>
